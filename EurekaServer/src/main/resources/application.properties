spring.application.name=EurekaServer
# Puerto del servidor Eureka
server.port=8761


# Este servidor no se registra a sí mismo
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# URL del servidor (referencia interna)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Logs menos verbosos (opcional pero recomendado)
logging.level.com.netflix.eureka=WARN
logging.level.com.netflix.discovery=WARN